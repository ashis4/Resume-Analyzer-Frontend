<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeIQ — Login / Sign Up</title>
  <link rel="stylesheet" href="/css/global.css"/>
  <link rel="stylesheet" href="/css/navbar.css"/>
  <link rel="stylesheet" href="/css/auth.css"/>
</head>
<body>

  <div id="navbar"></div>

  <div class="auth-wrapper">
    <div class="auth-card card">

      <div class="auth-logo">Resume<span>IQ</span></div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password"/>
        </div>
        <div id="loginError" class="error-msg"></div>
        <button class="btn-primary auth-btn" onclick="handleLogin()">Login</button>
        <p class="auth-switch">Don't have an account? <a onclick="switchTab('signup')">Sign up</a></p>
      </div>

      <div id="signupForm" style="display:none;">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Ashish Gaikar"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Minimum 6 characters"/>
        </div>
        <div id="signupError" class="error-msg"></div>
        <button class="btn-primary auth-btn" onclick="handleSignup()">Create Account</button>
        <p class="auth-switch">Already have an account? <a onclick="switchTab('login')">Login</a></p>
      </div>

    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    document.getElementById('navbar').innerHTML = renderNavbar();
    initTheme();
  </script>

</body>
</html>
